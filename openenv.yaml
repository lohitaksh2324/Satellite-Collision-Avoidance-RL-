name: satellite-collision-avoidance
version: "1.0"
description: >
  Agent nudges LEO satellites to avoid debris collisions.
  3D orbital propagation with partial-credit reward shaping.

action_space:
  type: object
  fields:
    satellite_id: string
    delta_v: "array[float, 3]"   # [dx, dy, dz] m/s

observation_space:
  satellites: "array[object]"
  debris: "array[object]"
  danger_pairs: "array[object]"
  message: string

tasks:
  - id: easy
    description: Avoid single debris object, 1 satellite, 100 steps
    max_steps: 100
    score_range: [0.0, 1.0]
  - id: medium
    description: 3 satellites, 20 debris, 200 steps
    max_steps: 200
    score_range: [0.0, 1.0]
  - id: hard
    description: 5 satellites, 50 debris, conjunctions, 500 steps
    max_steps: 500
    score_range: [0.0, 1.0]

reward:
  collision: -1.0
  safe_step: 0.1
  near_miss_partial: "linear 0.0–0.5 based on closest approach"

server:
  framework: fastapi
  host: 0.0.0.0
  port: 8000